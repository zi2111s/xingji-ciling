<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="192" height="192" fill="url(#grad1)"/>
  <g filter="url(#shadow)" transform="translate(96, 96)">
    <text x="0" y="20" text-anchor="middle" fill="white" font-size="72" font-weight="bold" font-family="Arial, sans-serif">词</text>
    <text x="0" y="75" text-anchor="middle" fill="white" font-size="36" font-weight="500" font-family="Arial, sans-serif">灵</text>
  </g>
  <g opacity="0.3">
    <circle cx="30" cy="40" r="3" fill="white"/>
    <circle cx="160" cy="50" r="2" fill="white"/>
    <circle cx="50" cy="150" r="2.5" fill="white"/>
    <circle cx="140" cy="140" r="2" fill="white"/>
    <circle cx="25" cy="100" r="1.5" fill="white"/>
    <circle cx="165" cy="110" r="2" fill="white"/>
  </g>
</svg>